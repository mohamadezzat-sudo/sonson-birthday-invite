<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited! 👾 Level Up Party</title>
    <!-- Link to Google Fonts for "fun" fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <!-- Include Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'arcade': ['"Press Start 2P"', 'cursive'],
                        'body': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'neon-pink': '#FF007F',
                        'neon-cyan': '#00FFFF',
                        'neon-purple': '#BF00FF',
                    },
                }
            }
        }
    </script>
    <style>
        /* Subtle animation for fun */
        @keyframes blink { 50% { opacity: 0; } }
        .animate-blink { animation: blink 1s step-end infinite; }
    </style>
</head>
<body class="bg-gray-900 text-white font-body p-6 md:p-10 min-h-screen flex items-center justify-center">

    <!-- Main Card Container with Neon Glow -->
    <div class="max-w-2xl w-full bg-gray-950 border-4 border-neon-cyan rounded-3xl shadow-[0_0_20px_#00FFFF75] p-8 md:p-12 overflow-hidden relative">
        
        <!-- Arcade Background Pattern (Subtle) -->
        <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#FF007F 1px, transparent 1px); background-size: 20px 20px;"></div>

        <!-- Header Section (Game Over/Level Up Theme) -->
        <header class="text-center mb-10 relative z-10">
            <h1 class="font-arcade text-4xl md:text-5xl text-neon-yellow leading-tight">
                GAME <span class="text-neon-cyan animate-blink">ON!</span>
            </h1>
            <p class="font-body text-xl text-neon-pink mt-4 font-bold">SONSON IS TURNING</p>
            <div class="relative inline-block mt-3">
                <span class="font-arcade text-8xl md:text-9xl text-white font-black drop-shadow-[0_10px_0_#BF00FF]">12</span>
                <span class="font-arcade text-2xl text-neon-yellow absolute -top-2 -right-8 rotate-12"></span>
            </div>
        </header>

        <!-- Main Invitation Body -->
        <main class="grid md:grid-cols-2 gap-8 relative z-10 bg-gray-900 p-6 rounded-2xl border-2 border-neon-purple">
            
            <!-- Details Column -->
            <div class="space-y-6">
                <div class="flex items-start gap-4">
                    <span class="text-4xl mt-1">📅</span>
                    <div>
                        <h3 class="text-neon-cyan font-bold text-lg">DATE & TIME</h3>
                        <p class="font-semibold text-xl">Wednesday, August 5th</p>
                        <p class="font-semibold text-xl">6:00 PM - 11:00 PM</p>
                    </div>
                </div>
                <div class="flex items-start gap-4">
                    <span class="text-4xl mt-1">🍕</span>
                    <div>
                        <h3 class="text-neon-cyan font-bold text-lg">FUELED BY</h3>
                        <p class="font-semibold text-xl">Love, Smiles, Pizza, Snacks, Cake, & Power-ups!</p>
                    </div>
                </div>
            </div>

            <!-- Location Column (The Important Part!) -->
            <div class="space-y-3 bg-gray-800 p-5 rounded-xl border border-neon-pink">
                <h2 class="font-arcade text-2xl text-neon-yellow text-center">LOCATION</h2>
                <div class="text-center">
                    <p class="text-2xl font-bold text-neon-pink">Rush Hub Arcade</p>
                    <p class="text-lg">Maxim Mall,</p>
                    <p class="text-lg">Second New Cairo</p>
                </div>

                <!-- Custom Google Maps Button -->
                <a href="https://www.google.com/maps/dir/?api=1&destination=30.0268576,31.4390623&destination_place_id=ChIJWTW-nTQjWBQRxfDaHASs8E8" 
                   target="_blank"
                   class="flex items-center justify-center gap-3 w-full bg-neon-pink hover:bg-pink-600 text-white font-arcade py-5 px-4 rounded-xl text-center transition-all duration-300 hover:scale-105 shadow-[0_5px_0_#800055] active:translate-y-1 active:shadow-[0_1px_0_#800055]">
                    <span class="text-2xl">📍</span>
                    GET DIRECTIONS
                </a>
            </div>
        </main>

        <!-- Footer / RSVP -->
        <footer class="text-center mt-10 relative z-10">
            <p class="font-body text-neon-yellow text-xl font-bold animate-pulse">RSVP To MiMo by AUG 4th</p>
            <p class="font-body text-gray-400 mt-3 text-sm">Prepare to Player 1... GO! 🎮</p>
        </footer>
        
    </div>
</body>
</html>
